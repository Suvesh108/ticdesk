{{template "base.html" .}}

{{define "title"}}Outlook Mail Inbox — ticDesk{{end}}

{{define "content"}}
<div class="space-y-5">

    <!-- Top Ribbon Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 pb-3 border-b border-[#292827]">
        <div>
            <div class="inline-flex items-center space-x-1.5 px-2 py-0.5 rounded bg-sky-500/10 border border-sky-500/20 text-sky-400 text-[10px] font-bold uppercase tracking-wider mb-1">
                <span>Outlook Mail Inbox</span>
            </div>
            <h1 class="text-xl font-bold text-white tracking-tight">Support Tickets Inbox</h1>
        </div>

        <a href="/tickets/new" class="px-3.5 py-1.5 bg-sky-600 hover:bg-sky-500 text-white font-semibold text-xs rounded transition-colors shadow-sm flex items-center space-x-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            <span>New Ticket</span>
        </a>
    </div>

    <!-- Filter & Search Toolbar -->
    <form id="filter-form" hx-get="/tickets" hx-target="#ticket-table-container" hx-swap="outerHTML" class="outlook-card p-3 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-2.5">
        <div class="relative">
            <input type="text" name="search" placeholder="Search ticket title or description..."
                   hx-trigger="keyup changed delay:300ms, search"
                   hx-get="/tickets"
                   hx-target="#ticket-table-container"
                   hx-swap="outerHTML"
                   hx-include="#filter-form"
                   class="w-full pl-8 pr-3 py-1.5 bg-[#1b1a19] border border-[#323130] rounded text-xs text-white placeholder-slate-500 focus:outline-none focus:border-sky-500">
            <svg class="w-4 h-4 text-slate-500 absolute left-2.5 top-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
        </div>

        <select name="status" @change="$dispatch('submit')"
                hx-get="/tickets" hx-target="#ticket-table-container" hx-swap="outerHTML" hx-include="#filter-form"
                class="px-2.5 py-1.5 bg-[#1b1a19] border border-[#323130] rounded text-xs text-slate-300 focus:outline-none focus:border-sky-500">
            <option value="">All Statuses</option>
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="resolved">Resolved</option>
            <option value="closed">Closed</option>
        </select>

        <select name="priority" @change="$dispatch('submit')"
                hx-get="/tickets" hx-target="#ticket-table-container" hx-swap="outerHTML" hx-include="#filter-form"
                class="px-2.5 py-1.5 bg-[#1b1a19] border border-[#323130] rounded text-xs text-slate-300 focus:outline-none focus:border-sky-500">
            <option value="">All Priorities</option>
            <option value="low">Low Priority</option>
            <option value="medium">Medium Priority</option>
            <option value="high">High Priority</option>
        </select>

        <select name="category_id" @change="$dispatch('submit')"
                hx-get="/tickets" hx-target="#ticket-table-container" hx-swap="outerHTML" hx-include="#filter-form"
                class="px-2.5 py-1.5 bg-[#1b1a19] border border-[#323130] rounded text-xs text-slate-300 focus:outline-none focus:border-sky-500">
            <option value="">All Categories</option>
            {{range .Categories}}
                <option value="{{.ID}}">{{.Name}}</option>
            {{end}}
        </select>
    </form>

    <!-- Ticket Table Container -->
    {{template "ticket_table.html" .}}

</div>
{{end}}
