{{template "base.html" .}}

{{define "title"}}Create New Ticket — ticDesk{{end}}

{{define "content"}}
<div class="w-full max-w-2xl mx-auto py-6" x-data="{ selectedPriority: 'medium' }">

    <div class="mb-6 flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Create New Support Ticket</h1>
            <p class="text-sm text-slate-400 mt-1">Submit an issue or IT service request to our support team</p>
        </div>
        <a href="/tickets" class="text-xs font-semibold text-slate-400 hover:text-white px-3 py-2 rounded-lg bg-slate-900 border border-slate-800 transition-colors">
            ← Back to Tickets
        </a>
    </div>

    <!-- Card Form -->
    <div class="glass-card rounded-2xl p-8 shadow-2xl relative overflow-hidden border border-slate-800">
        
        {{if .Error}}
            <div class="mb-6 p-4 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-300 text-sm flex items-center space-x-3">
                <svg class="w-5 h-5 text-rose-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span>{{.Error}}</span>
            </div>
        {{end}}

        <form action="/tickets" method="POST" class="space-y-6">
            <!-- Title -->
            <div>
                <label for="title" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Subject / Title *</label>
                <input type="text" id="title" name="title" required placeholder="e.g. Cannot connect to VPN server after update" 
                       class="w-full px-4 py-3 bg-slate-900/90 border border-slate-800 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-sm">
            </div>

            <!-- Category & Priority Row -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <!-- Category -->
                <div>
                    <label for="category_id" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Category *</label>
                    <select id="category_id" name="category_id" required 
                            class="w-full px-4 py-3 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-sm">
                        {{range .Categories}}
                            <option value="{{.ID}}">{{.Name}}</option>
                        {{end}}
                    </select>
                </div>

                <!-- Priority Selection Pill Radios -->
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Priority Level</label>
                    <div class="grid grid-cols-3 gap-2">
                        <label @click="selectedPriority = 'low'" 
                               :class="selectedPriority === 'low' ? 'border-slate-600 bg-slate-800 text-slate-200' : 'border-slate-800 bg-slate-900/60 text-slate-500 hover:border-slate-700'"
                               class="border rounded-xl py-2.5 px-2 cursor-pointer text-center transition-all flex items-center justify-center space-x-1">
                            <input type="radio" name="priority" value="low" x-model="selectedPriority" class="sr-only">
                            <span class="w-2 h-2 rounded-full bg-slate-400"></span>
                            <span class="text-xs font-medium">Low</span>
                        </label>

                        <label @click="selectedPriority = 'medium'" 
                               :class="selectedPriority === 'medium' ? 'border-amber-500/50 bg-amber-500/10 text-amber-300' : 'border-slate-800 bg-slate-900/60 text-slate-500 hover:border-slate-700'"
                               class="border rounded-xl py-2.5 px-2 cursor-pointer text-center transition-all flex items-center justify-center space-x-1">
                            <input type="radio" name="priority" value="medium" x-model="selectedPriority" class="sr-only">
                            <span class="w-2 h-2 rounded-full bg-amber-400"></span>
                            <span class="text-xs font-medium">Medium</span>
                        </label>

                        <label @click="selectedPriority = 'high'" 
                               :class="selectedPriority === 'high' ? 'border-rose-500/50 bg-rose-500/10 text-rose-300' : 'border-slate-800 bg-slate-900/60 text-slate-500 hover:border-slate-700'"
                               class="border rounded-xl py-2.5 px-2 cursor-pointer text-center transition-all flex items-center justify-center space-x-1">
                            <input type="radio" name="priority" value="high" x-model="selectedPriority" class="sr-only">
                            <span class="w-2 h-2 rounded-full bg-rose-400"></span>
                            <span class="text-xs font-medium">High</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Description -->
            <div>
                <label for="description" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Detailed Description *</label>
                <textarea id="description" name="description" rows="5" required placeholder="Provide clear details, steps to reproduce, or error codes..." 
                          class="w-full px-4 py-3 bg-slate-900/90 border border-slate-800 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-sm leading-relaxed"></textarea>
            </div>

            <!-- Submit Buttons -->
            <div class="flex items-center justify-end space-x-3 pt-4 border-t border-slate-800">
                <a href="/tickets" class="px-5 py-2.5 text-sm font-medium text-slate-400 hover:text-white transition-colors">Cancel</a>
                <button type="submit" 
                        class="px-6 py-2.5 bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 text-white font-semibold rounded-xl shadow-lg shadow-indigo-500/25 transition-all text-sm flex items-center space-x-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    <span>Submit Ticket</span>
                </button>
            </div>
        </form>
    </div>
</div>
{{end}}
