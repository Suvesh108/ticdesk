{{template "base.html" .}}

{{define "title"}}Sign In — ticDesk{{end}}

{{define "content"}}
<div class="w-full max-w-sm my-auto mx-auto" x-data="{ showPassword: false }">

    <div class="ui-card p-7 shadow-2xl relative overflow-hidden">
        
        <!-- Header -->
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-11 h-11 rounded-2xl bg-brand-500/10 border border-brand-500/20 mb-3 text-brand-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                </svg>
            </div>
            <h1 class="text-xl font-bold text-white tracking-tight">Sign in to ticDesk</h1>
            <p class="text-xs text-slate-400 mt-1">Manage your tickets and support queue</p>
        </div>

        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label for="email" class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-1.5">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="name@company.com" 
                       class="w-full px-3.5 py-2.5 bg-slate-900 border border-slate-800 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition-all text-xs">
            </div>

            <div>
                <label for="password" class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-1.5">Password</label>
                <div class="relative">
                    <input :type="showPassword ? 'text' : 'password'" id="password" name="password" required placeholder="••••••••" 
                           class="w-full px-3.5 py-2.5 bg-slate-900 border border-slate-800 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition-all text-xs pr-10">
                    <button type="button" @click="showPassword = !showPassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300 text-xs">
                        <span x-text="showPassword ? 'Hide' : 'Show'"></span>
                    </button>
                </div>
            </div>

            <button type="submit" 
                    class="w-full py-2.5 px-4 bg-brand-600 hover:bg-brand-500 text-white font-semibold rounded-xl shadow-lg shadow-brand-500/20 transition-all text-xs flex items-center justify-center space-x-1.5">
                <span>Sign In</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                </svg>
            </button>
        </form>

        <div class="mt-6 pt-4 border-t border-slate-800 text-center">
            <p class="text-xs text-slate-400">
                Don't have an account? 
                <a href="/register" class="text-brand-400 font-semibold hover:text-brand-300 ml-1">Create account</a>
            </p>
        </div>
    </div>
</div>
{{end}}
