<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100 antialiased selection:bg-indigo-500 selection:text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}ticDesk — IT Helpdesk & Ticketing System{{end}}</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- HTMX & Alpine.js -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        .glass-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-card-hover:hover {
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 0 25px -5px rgba(99, 102, 241, 0.15);
        }
    </style>
</head>
<body class="h-full font-sans flex flex-col justify-between bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-slate-950 text-slate-200">

    <!-- Global Navigation Header -->
    <header class="sticky top-0 z-40 border-b border-slate-800/80 bg-slate-950/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center space-x-3 group">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-indigo-600 to-indigo-400 flex items-center justify-center shadow-lg shadow-indigo-500/20 group-hover:scale-105 transition-transform duration-200">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path>
                    </svg>
                </div>
                <span class="text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-200 to-indigo-300">
                    ticDesk
                </span>
            </a>

            <div class="flex items-center space-x-4">
                {{if .User}}
                    <div class="flex items-center space-x-3 bg-slate-900/60 border border-slate-800 px-3 py-1.5 rounded-full">
                        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                        <span class="text-sm font-medium text-slate-300">{{.User.Name}}</span>
                        <span class="text-xs uppercase font-semibold tracking-wider px-2 py-0.5 rounded-full {{if eq .User.Role "admin"}}bg-amber-500/10 text-amber-400 border border-amber-500/20{{else if eq .User.Role "support"}}bg-indigo-500/10 text-indigo-400 border border-indigo-500/20{{else}}bg-slate-800 text-slate-400 border border-slate-700{{end}}">
                            {{.User.Role}}
                        </span>
                    </div>
                    <form action="/logout" method="POST">
                        <button type="submit" class="text-sm font-medium text-slate-400 hover:text-white transition-colors duration-150 flex items-center space-x-1.5 px-3 py-1.5 rounded-lg hover:bg-slate-900">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                            </svg>
                            <span>Logout</span>
                        </button>
                    </form>
                {{else}}
                    <a href="/login" class="text-sm font-medium text-slate-300 hover:text-white px-3 py-2 transition-colors">Sign in</a>
                    <a href="/register" class="text-sm font-medium bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 text-white px-4 py-2 rounded-lg shadow-lg shadow-indigo-500/20 transition-all duration-200 hover:shadow-indigo-500/30">Get Started</a>
                {{end}}
            </div>
        </div>
    </header>

    <!-- Notification Toast Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col space-y-2"></div>

    <!-- Main Content Body -->
    <main class="flex-grow flex items-center justify-center p-4 sm:p-6 lg:p-8">
        {{block "content" .}}{{end}}
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-900 bg-slate-950 py-6 text-center text-xs text-slate-500">
        <div class="max-w-7xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-between gap-2">
            <p>&copy; 2026 ticDesk Inc. IT Helpdesk & Ticketing System.</p>
            <div class="flex items-center space-x-4">
                <span class="inline-flex items-center space-x-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
                    <span>System Operational</span>
                </span>
                <span>•</span>
                <span>Go + HTMX + Alpine + Postgres</span>
            </div>
        </div>
    </footer>

</body>
</html>
